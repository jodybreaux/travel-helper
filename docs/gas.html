<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gas · Travel Helper</title>
    <link rel="stylesheet" href="styles.css?v=2.39" />
  </head>
  <body data-current-page="gas">
    <header class="site-header">
      <div class="site-utility-bar" aria-label="Quick actions">
        <button type="button" class="near-me-trigger" id="nearMeButton" aria-label="Find food and gas near your current location">
          <span class="near-me-trigger-text" id="nearMeButtonText">Food &amp; gas near me</span>
          <span class="wait-cursor near-me-wait" id="nearMeWait" hidden aria-hidden="true"></span>
        </button>
        <p class="near-me-status" id="nearMeStatus" role="status" aria-live="polite"></p>
      </div>
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="index.html" aria-label="Travel Helper home">
          <span class="brand-mark">TH</span>
          <span>Travel Helper</span>
        </a>
        <div class="nav-actions">
          <a class="nav-link" href="route-info.html">Plan a Trip</a>
          <a class="nav-link" href="routes.html">Routes</a>
          <a class="nav-link" href="meals.html">Meals</a>
          <a class="nav-link" href="gas.html">Gas</a>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
            <span id="themeLabel">Dark</span>
          </button>
        </div>
      </nav>
      <div class="near-me-bar" aria-label="Food and gas near your current location">
        <div class="near-me-results restaurant-list" id="nearMeResults" hidden></div>
      </div>
    </header>

    <main id="top">
      <section class="details-layout" aria-label="Gas recommendations">
        <article class="insight-card">
          <div class="card-header">
            <span class="icon-bubble">G</span>
            <div>
              <h3>Fuel Stops</h3>
              <p>Optional gas stations near each planned stop, with forward fallback options when needed.</p>
            </div>
          </div>
          <div id="gasPanel" class="empty-state">Select a route to load gas suggestions.</div>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <p>Cajun Travel Services · v2.39 · Built 2026-07-02 14:47 UTC</p>
    </footer>

    <script type="module" src="js/pages/gas.js?v=2.39"></script>
  </body>
</html>
